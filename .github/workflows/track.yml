name: Track Subspace settings

on:
  schedule:
    # Best-effort every 15 minutes. GitHub may delay or throttle scheduled
    # runs under load, and disables them after 60 days of repo inactivity.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# Allow the job to push commits back to the repository, and to publish the
# generated changelog site to GitHub Pages (pages + id-token are required by
# actions/deploy-pages).
permissions:
  contents: write
  pages: write
  id-token: write

# Never let two syncs run at once (avoids push races).
concurrency:
  group: track-settings
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so build_site.py can render the whole changelog.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        run: |
          git config user.name  "subspace-tracker[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch & split arena settings
        run: python track.py --commit

      - name: Push changes
        run: git push

      # Build the changelog site from git history and publish it to Pages.
      # The site is a Pages artifact only -- it is never committed, so the
      # 15-minute job stays noise-free (track.py's "no volatile content" rule).
      - name: Build changelog site
        run: python build_site.py --output _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
